<script>
(function(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('fresh')!=='1') return;
  const keep='p26-pre2-submitted-projects';
  const keys=[];
  for(let i=0;i<localStorage.length;i++) keys.push(localStorage.key(i));
  keys.forEach(k=>{
    const low=String(k||'').toLowerCase();
    if(k!==keep && (low.includes('pre2') || low.includes('catmaze'))) localStorage.removeItem(k);
  });
  history.replaceState(null,'',window.location.pathname);
})();
</script>

<script>
(function(){
  const STORE_KEY='p26-page-date-times:'+location.pathname;
  function pad(n){return String(n).padStart(2,'0')}
  function localStamp(d=new Date()){return {iso:d.toISOString(),date:d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()),time:pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()),local:d.toLocaleString()}}
  function read(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}catch(e){return {}}}
  function write(v){try{localStorage.setItem(STORE_KEY,JSON.stringify(v))}catch(e){}}
  function currentPageNumber(){
    const ids=['pageNow','pageStatus','pageNumber','currentPage'];
    for(const id of ids){const el=document.getElementById(id);if(el){const m=String(el.textContent||el.value||'').match(/\d+/);if(m)return Number(m[0])}}
    const sel=document.querySelector('#pageSelect, select[id*="page"], select[id*="Page"]');
    if(sel&&sel.value!==''&&!Number.isNaN(Number(sel.value)))return Number(sel.value)+1;
    return 1;
  }
  function stampPage(){
    const n=currentPageNumber();
    const all=read();
    const now=localStamp();
    const k='page'+n;
    all[k]=all[k]||{page:n,firstSeenIso:now.iso,firstSeenLocal:now.local,firstSeenDate:now.date,firstSeenTime:now.time};
    all[k].lastSeenIso=now.iso;all[k].lastSeenLocal=now.local;all[k].lastSeenDate=now.date;all[k].lastSeenTime=now.time;
    write(all);
  }
  function enrichNetlifyDates(){
    stampPage();
    const now=localStamp();
    const all=read();
    const pagesInput=document.getElementById('netlifyPages')||document.querySelector('input[name="pages_json"]');
    if(pagesInput&&pagesInput.value){
      try{
        const pages=JSON.parse(pagesInput.value);
        if(Array.isArray(pages)){
          pagesInput.value=JSON.stringify(pages.map((p,i)=>{
            const rec=all['page'+(i+1)]||{};
            return Object.assign({},p,{pageDate:rec.firstSeenDate||now.date,pageTime:rec.firstSeenTime||now.time,pageFirstSeenIso:rec.firstSeenIso||now.iso,pageFirstSeenLocal:rec.firstSeenLocal||now.local,pageLastSeenIso:rec.lastSeenIso||now.iso,pageLastSeenLocal:rec.lastSeenLocal||now.local,pageSubmittedIso:now.iso,pageSubmittedLocal:now.local});
          }));
        }
      }catch(e){}
    }
    const summaryInput=document.getElementById('netlifySummary')||document.querySelector('input[name="summary_json"]');
    if(summaryInput&&summaryInput.value){
      try{
        const summary=JSON.parse(summaryInput.value);
        summary.submissionDate=now.date;summary.submissionTime=now.time;summary.submissionIso=now.iso;summary.submissionLocal=now.local;summary.pageDateTimes=all;
        summaryInput.value=JSON.stringify(summary);
      }catch(e){}
    }
    const interactionsInput=document.getElementById('netlifyInteractions')||document.querySelector('input[name="interactions_json"]');
    if(interactionsInput&&interactionsInput.value){
      try{const interactions=JSON.parse(interactionsInput.value);if(Array.isArray(interactions)){interactions.push({at:now.iso,type:'page-date-time-record',detail:{submissionLocal:now.local,pageDateTimes:all}});interactionsInput.value=JSON.stringify(interactions)}}catch(e){}
    }
  }
  window.p26StampPageDateTimes=stampPage;
  window.p26EnrichNetlifyDateTimes=enrichNetlifyDates;
  document.addEventListener('click',stampPage,true);
  document.addEventListener('change',stampPage,true);
  document.addEventListener('input',stampPage,true);
  setInterval(stampPage,2000);
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',stampPage);else stampPage();
  const attach=()=>{const form=document.getElementById('netlifySubmissionForm');if(form&&!form.dataset.p26DateTimeHook){form.dataset.p26DateTimeHook='1';form.addEventListener('submit',enrichNetlifyDates)}};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',attach);else attach();
})();
</script>

<script id="p26UniformEntryScript">
(function(){
  const CODES=['1847','2963','3750','4286','5391','6074','7128','8539','9146','1205','2384','3497','4561','5682','6793','7814','8925','9036','1472','2583','3694','4705','5816','6927'];
  const EMOJIS=['&#128049;','&#11088;','&#128663;','&#127822;','&#127752;','&#9917;','&#127880;','&#128640;','&#127850;','&#127775;','&#129513;','&#127922;','&#127804;','&#127936;','&#128161;','&#127881;','&#128690;','&#127853;','&#128681;','&#127826;','&#127912;','&#128214;','&#127774;','&#127873;'];
  function projectName(){const h=document.querySelector('#startScreen h1');return (h&&h.textContent.trim())||document.title||'Cat Project'}
  function recordPress(code){try{if(typeof recordInteraction==='function')recordInteraction('student-code-button',{code});else if(typeof log==='function')log('student-code-button',{code})}catch(e){}}
  function normalize(){
    const screen=document.getElementById('startScreen'); if(!screen) return;
    let card=screen.querySelector('.start-card')||screen.querySelector('form')||screen.firstElementChild; if(!card) return;
    const input=document.getElementById('studentCode')||document.getElementById('studentIdInput'); if(!input) return;
    const oldStart=card.querySelector('button[type="submit"],button.primary,#startBtn');
    const isForm=card.tagName&&card.tagName.toLowerCase()==='form';
    const title=projectName();
    const grade=document.getElementById('gradeSelect')||document.getElementById('gradeLevel')||document.getElementById('grade')||document.getElementById('gradeInput');
    if(grade){ if(!grade.value) grade.value='1'; const gl=grade.closest('label')||grade; gl.classList.add('p26-entry-hidden'); }
    input.readOnly=true; input.placeholder='Press a number';
    card.classList.add('p26-uniform-entry');
    const titleBar=document.createElement('div'); titleBar.className='p26-entry-title';
    titleBar.innerHTML='<img src="big-bear-math-logo.png" alt="Big Bear Math"><h1>'+title+'</h1>';
    const left=document.createElement('div'); left.className='p26-entry-left';
    const label=document.createElement('label'); label.textContent='Student Code'; label.appendChild(input);
    const startBtn=document.createElement('button');
    startBtn.id='startBtn'; startBtn.className='p26-start-button'; startBtn.textContent='Start'; startBtn.type=isForm?'submit':'button'; startBtn.addEventListener('click',function(e){if(!input.value){e.preventDefault();e.stopImmediatePropagation();alert('Press a number first.');}});
    if(!isForm){
      startBtn.addEventListener('click',()=>{
        if(!input.value){alert('Press a number first.');return;}
        if(oldStart && !oldStart.matches('.p26-code-choice,.code-choice,.code-button')){oldStart.click();return;}
        if(typeof window.start==='function'){window.start();return;}
        if(typeof window.begin==='function'){window.begin();return;}
        if(typeof window.startProject==='function'){window.startProject();return;}
        if(typeof window.startWork==='function'){window.startWork();return;}
      });
    }
    left.appendChild(label); left.appendChild(startBtn);
    let grid=document.getElementById('codeGrid');
    if(!grid){grid=document.createElement('div'); grid.id='codeGrid';}
    grid.className='p26-code-grid code-grid'; grid.setAttribute('aria-label','Choose your student number');
    card.innerHTML=''; card.appendChild(titleBar); card.appendChild(left); card.appendChild(grid);
    function render(){
      grid.innerHTML=CODES.map((code,i)=>'<button type="button" class="p26-code-choice '+(input.value===code?'selected':'')+'" data-code="'+code+'"><span>'+code+'</span><small class="code-emoji">'+EMOJIS[i%EMOJIS.length]+'</small></button>').join('');
      grid.querySelectorAll('[data-code]').forEach(btn=>btn.addEventListener('click',()=>{input.value=btn.dataset.code;input.dispatchEvent(new Event('input',{bubbles:true}));recordPress(btn.dataset.code);render()}));
    }
    window.renderCodes=render; render();
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',normalize);else normalize();
})();
</script>
<script id="p26Pre2HardeningScript">
(function(){
  function codeValue(){const input=document.getElementById('studentCode')||document.getElementById('studentIdInput');return input?input.value.trim():''}
  function visibleStart(){const s=document.getElementById('startScreen');return s && !s.classList.contains('hidden') && getComputedStyle(s).display!=='none'}
  function requireCode(event){if(visibleStart()&&!codeValue()){if(event){event.preventDefault();event.stopImmediatePropagation&&event.stopImmediatePropagation();}alert('Press a student number first.');return false}return true}
  document.addEventListener('submit',function(e){const form=e.target;if(form && (form.id==='startForm'||(form.closest&&form.closest('#startScreen'))))requireCode(e)},true);
  document.addEventListener('click',function(e){const b=e.target.closest&&e.target.closest('#startBtn,.p26-start-button,button.primary');if(b&&visibleStart()&&!codeValue())requireCode(e)},true);
  ['start','begin','startProject','startWork'].forEach(function(name){try{const old=window[name];if(typeof old==='function'&&!old.__p26NeedsCode){const wrapped=function(){if(!requireCode())return;return old.apply(this,arguments)};wrapped.__p26NeedsCode=true;window[name]=wrapped;}}catch(e){}});
  function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
  function isAnswerSelect(sel){if(!sel||sel.dataset.p26NoShuffle)return false;const id=(sel.id||'').toLowerCase();if(/page|grade|support|assessment|teacher|quick|strategy/.test(id))return false;if(sel.closest('aside,.admin'))return false;return sel.options&&sel.options.length>3;}
  function randomizeSelect(sel){if(!isAnswerSelect(sel))return;const selected=sel.value;const opts=[...sel.options];const keep=opts.filter(o=>o.value===''||/^(choose|\?|select)/i.test(o.textContent.trim()));const pool=opts.filter(o=>!keep.includes(o));const sig=pool.map(o=>o.value+'|'+o.textContent).join('~');if(sel.dataset.p26ShuffleSig===sig)return;shuffle(pool);sel.innerHTML='';keep.forEach(o=>sel.appendChild(o));pool.forEach(o=>sel.appendChild(o));sel.value=selected;sel.dataset.p26ShuffleSig=sig;}
  function randomizeDropdowns(){document.querySelectorAll('select').forEach(randomizeSelect)}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',randomizeDropdowns);else randomizeDropdowns();
  new MutationObserver(()=>randomizeDropdowns()).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
<script id="p26Pre2DirectEntryRepair">
(function(){
  function screen(){return document.getElementById('startScreen')}
  function visibleStart(){const s=screen();return s && !s.classList.contains('hidden') && getComputedStyle(s).display!=='none'}
  function inputEl(){return document.getElementById('studentCode')||document.getElementById('studentIdInput')||document.querySelector('#startScreen input[type="text"],#startScreen input:not([type])')}
  function setText(ids,value){ids.forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=value})}
  function openProject(code){
    const input=inputEl(); if(input) input.value=code;
    try{
      if(typeof state!=='undefined' && state){
        state.studentId=code;
        state.student=code;
        state.studentCode=code;
        state.grade='1';
        if(!state.startedAt) state.startedAt=(typeof nowIso==='function'?nowIso():Date.now());
        if('lastTick' in state) state.lastTick=Date.now();
      }
    }catch(e){}
    try{if(typeof pageStartedAt!=='undefined')pageStartedAt=Date.now();}catch(e){}
    try{if(typeof log==='function')log('start',{studentId:code,grade:'1'});}catch(e){}
    try{if(typeof recordInteraction==='function')recordInteraction('start',{studentId:code,grade:'1'});}catch(e){}
    const s=screen();
    if(s){s.classList.add('hidden');s.style.setProperty('display','none','important')}
    ['app','mainApp','workArea'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('hidden');el.style.removeProperty('display')}});
    const shell=document.querySelector('.shell'); if(shell){shell.classList.remove('hidden');shell.style.removeProperty('display')}
    setText(['studentStatus','studentReadout','studentIdStatus'],code);
    setText(['gradeStatus','gradeReadout'],'Grade 1');
    if(typeof render==='function')render();
    if(s){s.classList.add('hidden');s.style.setProperty('display','none','important')}
    ['app','mainApp','workArea'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('hidden');el.style.removeProperty('display')}});
    if(shell){shell.classList.remove('hidden');shell.style.removeProperty('display')}
    try{if(typeof store==='function')store();}catch(e){}
    try{if(typeof save==='function')save();}catch(e){}
    try{if(typeof saveState==='function')saveState();}catch(e){}
  }
  function attemptStart(event){
    const isSubmit=event && event.type==='submit';
    const btn=!isSubmit && event.target.closest&&event.target.closest('#startBtn,.p26-start-button,button.primary,#startScreen button[type="submit"]');
    if(!visibleStart() || (!isSubmit && !btn)) return;
    const input=inputEl();
    const code=input?String(input.value||'').trim():'';
    if(!code){if(event){event.preventDefault();event.stopImmediatePropagation&&event.stopImmediatePropagation();}alert('Press a student number first.');return;}
    if(event){event.preventDefault();event.stopImmediatePropagation&&event.stopImmediatePropagation();}
    try{openProject(code)}catch(err){alert('This project could not start: '+err.message)}
  }
  document.addEventListener('click',attemptStart,true);
  document.addEventListener('submit',function(event){const s=screen();if(s&&event.target&&s.contains(event.target))attemptStart(event)},true);
})();
</script>
